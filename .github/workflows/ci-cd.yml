name: CI/CD - TCIP Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run lint (ruff)
        run: |
          cd backend
          pip install ruff
          ruff check .

      - name: Check formatting
        run: |
          cd backend
          pip install black
          black --check .

      - name: Run migrations
        run: |
          cd backend
          python manage.py migrate --check

      - name: Run tests
        run: |
          cd backend
          pip install pytest pytest-django pytest-cov
          pytest --cov=. --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Django checks
        run: |
          cd backend
          python manage.py check

      - name: Create backup before deploy
        run: |
          cd backend
          python backup.py

      - name: Commit backup
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto backup $(date +'%Y-%m-%d %H:%M')"
          file_pattern: backend/backups/*
